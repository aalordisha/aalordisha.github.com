<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alor Disha - Connect With Us</title>
    
    <!-- Optimized Font Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #0f3d59;
            --accent-gold: #c5a059;
            --youtube-red: #ff0000;
            --facebook-blue: #1877f2;
            --success-green: #28a745;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Container */
        .container {
            max-width: 850px;
            width: 100%;
            background: var(--card-bg);
            border-top: 6px solid var(--accent-gold);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            padding: 40px 30px;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 2.8rem); /* Responsive typography */
            color: var(--primary-blue);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        header p {
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Section Titles */
        .section-title {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--primary-blue);
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .section-title::before,
        .section-title::after {
            content: '';
            height: 1px;
            width: 50px;
            background: var(--accent-gold);
            opacity: 0.5;
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            /* Auto-fit makes it highly responsive: 1 col on mobile, multi-col on PC */
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Card Design */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            border: 1px solid #eaeaea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
            border-color: #ddd;
        }

        /* Platform Icons */
        .platform-badge {
            font-size: 2.5rem;
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .card:hover .platform-badge {
            transform: scale(1.1);
        }

        .card.youtube .platform-badge { color: var(--youtube-red); }
        .card.facebook .platform-badge { color: var(--facebook-blue); }

        .card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        /* Action Buttons */
        .action-btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            border-radius: 30px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .card.youtube .action-btn {
            background-color: var(--youtube-red);
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.2);
        }

        .card.facebook .action-btn {
            background-color: var(--facebook-blue);
            box-shadow: 0 4px 10px rgba(24, 119, 242, 0.2);
        }

        .action-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        /* Visited "Done" State */
        .action-btn.done {
            background-color: var(--success-green) !important;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2) !important;
            color: #fff !important;
            /* pointer-events removed so user can click and reopen the link */
        }

        /* Footer */
        footer {
            margin-top: 40px;
            background: var(--primary-blue);
            color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            font-size: 0.95rem;
        }

        footer div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        footer i {
            color: var(--accent-gold);
            font-size: 1.1rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            footer {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ALOR DISHA</h1>
            <p>Connect with us online</p>
        </header>

        <!-- YouTube Channels Section -->
        <div class="section-title">YouTube Channels</div>
        <div class="grid-container">
            <!-- Card 1 -->
            <div class="card youtube">
                <div class="platform-badge"><i class="fab fa-youtube"></i></div>
                <h3>ALOR DISHA YOUTUBE</h3>
                <a href="https://www.youtube.com/@ADSPALORDISHA" target="_blank" class="action-btn" data-id="yt-1">Subscribe Now</a>
            </div>
            <!-- Card 2 -->
            <div class="card youtube">
                <div class="platform-badge"><i class="fab fa-youtube"></i></div>
                <h3>SATYAKI PAHARI YOUTUBE</h3>
                <a href="https://youtube.com/@satyakipahari" target="_blank" class="action-btn" data-id="yt-2">Subscribe Now</a>
            </div>
        </div>

        <!-- Facebook Community Section -->
        <div class="section-title">Facebook Community</div>
        <div class="grid-container">
            <!-- Card 3 -->
            <div class="card facebook">
                <div class="platform-badge"><i class="fab fa-facebook"></i></div>
                <h3>ALOR DISHA PAGE</h3>
                <a href="https://www.facebook.com/ADSPALORDISHA" target="_blank" class="action-btn" data-id="fb-1">Follow Page</a>
            </div>
            <!-- Card 4 -->
            <div class="card facebook">
                <div class="platform-badge"><i class="fab fa-facebook"></i></div>
                <h3>ALOR DISHA GROUP</h3>
                <a href="https://www.facebook.com/groups/2662021470536409" target="_blank" class="action-btn" data-id="fb-2">Join Group</a>
            </div>
            <!-- Card 5 -->
            <div class="card facebook">
                <div class="platform-badge"><i class="fab fa-facebook"></i></div>
                <h3>SATYAKI PAHARI</h3>
                <a href="https://www.facebook.com/satyaki.pahari.2025" target="_blank" class="action-btn" data-id="fb-3">Connect Profile</a>
            </div>
        </div>

        <!-- Footer Contact Info -->
        <footer>
            <div><i class="fas fa-envelope"></i> satyakimv@gmail.com</div>
            <div><i class="fas fa-phone-alt"></i> +91 7407917787</div>
        </footer>
    </div>

    <!-- Tracking Logic Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.action-btn');

            buttons.forEach(button => {
                const buttonId = button.getAttribute('data-id');
                const storageKey = 'visited_link_' + buttonId;

                // 1. On page load, check if it was previously clicked
                if (localStorage.getItem(storageKey) === 'true') {
                    setButtonDone(button);
                }

                // 2. Listen for clicks to mark as done
                button.addEventListener('click', () => {
                    // Save the visited state in local storage
                    localStorage.setItem(storageKey, 'true');
                    
                    // Update the UI after a brief delay so the user can open the link first
                    setTimeout(() => {
                        setButtonDone(button);
                    }, 500);
                });
            });

            // Helper function to visually update the button
            function setButtonDone(btn) {
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Done';
                btn.classList.add('done');
            }
        });
    </script>
</body>
</html>
